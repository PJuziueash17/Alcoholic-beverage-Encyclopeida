// Load drawing data

const img = new Image();
img.onload = () => c.drawImage(img, 0, 0);
img.src = drawingData;

// ── Pointer Events unified handler (mouse + touch + pen) ──
useEffect(() => {
const canvas = canvasRef.current;
if (!canvas) return;

```
// Body scroll lock helpers
const lockScroll = () => {
  document.body.style.overflow = "hidden";
  document.body.style.touchAction = "none";
};
const unlockScroll = () => {
  document.body.style.overflow = "";
  document.body.style.touchAction = "";
};

// Prevent any residual touch-based scrolling on document during draw
const preventTouchMove = (e) => {
  if (isDrawingRef.current) e.preventDefault();
};

const getPos = (e) => {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (width / rect.width),
    y: (e.clientY - rect.top) * (height / rect.height),
  };
};

const onPointerDown = (e) => {
  e.preventDefault();
  e.stopPropagation();
  canvas.setPointerCapture(e.pointerId);
  isDrawingRef.current = true;
  lastPos.current = getPos(e);
  // Save undo snapshot
  const snap = canvas.toDataURL();
  setHistory(h => [...h, snap]);
  lockScroll();
};

const onPointerMove = (e) => {
  e.preventDefault();
  e.stopPropagation();
  if (!isDrawingRef.current) return;
  const ctx = canvas.getContext("2d");
  const pos = getPos(e);
  const t = toolRef.current;
  ctx.lineWidth = t === "eraser" ? 18 : 2.5;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.strokeStyle = t === "eraser" ? "#faf6f0" : colorRef.current;
  ctx.globalCompositeOperation = t === "eraser" ? "destination-out" : "source-over";
  ctx.beginPath();
  ctx.moveTo(lastPos.current.x, lastPos.current.y);
  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();
  lastPos.current = pos;
};

const onPointerUp = (e) => {
  e.preventDefault();
  e.stopPropagation();
  if (!isDrawingRef.current) return;
  canvas.releasePointerCapture(e.pointerId);
  isDrawingRef.current = false;
  canvas.getContext("2d").globalCompositeOperation = "source-over";
  unlockScroll();
  onDrawingChange(canvas.toDataURL());
};

// Register with passive:false for all pointer events
canvas.addEventListener("pointerdown", onPointerDown, { passive: false });
canvas.addEventListener("pointermove", onPointerMove, { passive: false });
canvas.addEventListener("pointerup", onPointerUp, { passive: false });
canvas.addEventListener("pointercancel", onPointerUp, { passive: false });
// Also block touch events at canvas level as fallback
canvas.addEventListener("touchstart", (e) => e.preventDefault(), { passive: false });
canvas.addEventListener("touchmove", (e) => e.preventDefault(), { passive: false });
// Block document-level touchmove during drawing
document.addEventListener("touchmove", preventTouchMove, { passive: false });

return () => {
  canvas.removeEventListener("pointerdown", onPointerDown);
  canvas.removeEventListener("pointermove", onPointerMove);
  canvas.removeEventListener("pointerup", onPointerUp);
  canvas.removeEventListener("pointercancel", onPointerUp);
  document.removeEventListener("touchmove", preventTouchMove);
  unlockScroll();
};

/* ════════════════════════════════════════════
Developing Animation
════════════════════════════════════════════ */
function DevelopingAnimation({ entry, onComplete }) {
const [phase, setPhase] = useState(0);
useEffect(() => {
const t1 = setTimeout(() => setPhase(1), 500);
const t2 = setTimeout(() => setPhase(2), 1800);
const t3 = setTimeout(onComplete, 3200);
return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
}, [onComplete]);

return (
<div style={{ position: “fixed”, inset: 0, zIndex: 1000, background: “rgba(20,18,15,0.78)”, backdropFilter: “blur(8px)”, display: “flex”, alignItems: “center”, justifyContent: “center”, flexDirection: “column”, fontFamily: “‘Zen Kurenaido’, sans-serif” }}>
<div style={{ transform: phase >= 1 ? “translateY(0) scale(1)” : “translateY(100px) scale(0.88)”, opacity: phase >= 1 ? 1 : 0, transition: “all 0.7s cubic-bezier(0.34,1.56,0.64,1)” }}>
<div style={{ filter: phase < 2 ? “brightness(0.9) saturate(0.3)” : “brightness(1) saturate(1)”, transition: “filter 1s ease” }}>
<ChekiCard entry={entry} />
</div>
</div>
<div style={{ marginTop: 24, color: “#faf6f0”, fontSize: 16, opacity: phase >= 2 ? 1 : 0, transform: phase >= 2 ? “translateY(0)” : “translateY(8px)”, transition: “all 0.5s ease 0.15s”, textAlign: “center” }}>
<div style={{ fontSize: 13, opacity: 0.65, marginBottom: 3 }}>✨ 現像完了</div>
<div>No.{String(entry.number).padStart(3, “0”)}　{entry.drinkName}　登録完了</div>
</div>
</div>
);
}

function PhotoCapture({ onCapture, onCancel }) {
const fileRef = useRef(null);
const [preview, setPreview] = useState(null);
const handleFile = (e) => { const f = e.target.files?.[0]; if (!f) return; const r = new FileReader(); r.onload = (ev) => setPreview(ev.target.result); r.readAsDataURL(f); };

return (
<div style={{ position: “fixed”, inset: 0, zIndex: 900, background: “rgba(20,18,15,0.88)”, backdropFilter: “blur(6px)”, display: “flex”, flexDirection: “column”, alignItems: “center”, justifyContent: “center”, padding: 24, fontFamily: “‘Zen Kurenaido’, sans-serif” }}>
{!preview ? (
<>
<div style={{ color: “#faf6f0”, fontSize: 18, marginBottom: 24 }}>写真を選んでください</div>
<div style={{ display: “flex”, gap: 14 }}>
<button onClick={() => { fileRef.current.setAttribute(“capture”, “environment”); fileRef.current.click(); }} style={btnPrimary}>📷 カメラで撮影</button>
<button onClick={() => { fileRef.current.removeAttribute(“capture”); fileRef.current.click(); }} style={btnPrimary}>🖼 カメラロール</button>
</div>
<button onClick={onCancel} style={{ …btnGhost, marginTop: 18, color: “#d4c5b0”, borderColor: “#8b7355” }}>キャンセル</button>
<input ref={fileRef} type=“file” accept=“image/*” onChange={handleFile} style={{ display: “none” }} />
</>
) : (
<>
<img src={preview} alt=”” style={{ maxWidth: 260, maxHeight: 300, borderRadius: 6, objectFit: “cover” }} />
<div style={{ display: “flex”, gap: 14, marginTop: 18 }}>
<button onClick={() => setPreview(null)} style={{ …btnGhost, color: “#d4c5b0”, borderColor: “#8b7355” }}>撮り直す</button>
<button onClick={() => onCapture(preview)} style={btnPrimary}>この写真を使う</button>
</div>
</>
)}
</div>
);
}

/* ════════════════════════════════════════════
Progress Computation (種類数ベース)
════════════════════════════════════════════ */
const GOAL = 100;

function computeProgress(entries) {
const seen = new Set();
const uniqueEntries = [];
for (const e of entries) {
const key = e.nameMode === “handwrite” ? `__hw_${e.id}` : e.drinkName.trim().toLowerCase();
if (!seen.has(key)) { seen.add(key); uniqueEntries.push(e); }
}
const uniqueDrinkCount = uniqueEntries.length;
const remainingCount = Math.max(GOAL - uniqueDrinkCount, 0);
const progressPercent = Math.floor((Math.min(uniqueDrinkCount, GOAL) / GOAL) * 100);
const today = new Date().toLocaleDateString(“ja-JP”);
const todayNewCount = uniqueEntries.filter(e => e.date === today).length;
const recentUniqueDrinks = […uniqueEntries].sort((a, b) => b.createdAt - a.createdAt).slice(0, 5);
return { uniqueDrinkCount, remainingCount, progressPercent, todayNewCount, recentUniqueDrinks };
}

function BookGallery({ entries, onSelect, onNewEntry }) {
const [page, setPage] = useState(0);

const [turning, setTurning] = useState(null);
const [showCelebration, setShowCelebration] = useState(false);
const prevCountRef = useRef(computeProgress(entries).uniqueDrinkCount);

// Detect when 100 is reached
useEffect(() => {
const { uniqueDrinkCount } = computeProgress(entries);
if (uniqueDrinkCount >= GOAL && prevCountRef.current < GOAL) {
setShowCelebration(true);
}
prevCountRef.current = uniqueDrinkCount;
}, [entries]);

const filtered = entries
.filter(e => !search || e.drinkName.toLowerCase().includes(search.toLowerCase()) || e.location?.toLowerCase().includes(search.toLowerCase()))
.sort((a, b) => {
if (sortBy === “number”) return a.number - b.number;
if (sortBy === “date”) return b.createdAt - a.createdAt;
if (sortBy === “location”) return (a.location || “”).localeCompare(b.location || “”);
return 0;
});

const totalPages = Math.max(1, Math.ceil(filtered.length / ITEMS_PER_PAGE));
const currentPage = Math.min(page, totalPages - 1);
const pageStart = currentPage * ITEMS_PER_PAGE;

const slots = [];
for (let i = 0; i < ITEMS_PER_PAGE; i++) {
const entry = filtered[pageStart + i];
const slotNumber = pageStart + i + 1;
slots.push(entry ? { entry, slotNumber } : { entry: null, slotNumber });
}

const turnPage = (dir) => {
setTurning(dir);
setTimeout(() => {
setPage(p => dir === “next” ? Math.min(p + 1, totalPages - 1) : Math.max(p - 1, 0));
setTurning(null);
}, 320);

function App() {
const [entries, setEntries] = useState([]);
const [screen, setScreen] = useState(“gallery”);
const [selectedEntry, setSelectedEntry] = useState(null);
const [capturedPhoto, setCapturedPhoto] = useState(null);
const [developing, setDeveloping] = useState(null);
const [loaded, setLoaded] = useState(false);

useEffect(() => { loadEntries().then(e => { setEntries(e); setLoaded(true); }); }, []);
useEffect(() => { if (loaded) saveEntries(entries); }, [entries, loaded]);

const nextNumber = entries.length > 0 ? Math.max(…entries.map(e => e.number)) + 1 : 1;

const handleSave = useCallback((entry) => {
setEntries(prev => {
const idx = prev.findIndex(e => e.id === entry.id);
if (idx >= 0) { const n = […prev]; n[idx] = entry; return n; }
return […prev, entry];
});
setDeveloping(entry);
}, []);

const handleDelete = useCallback((id) => {
setEntries(prev => prev.filter(e => e.id !== id));
setScreen(“gallery”);
}, []);

if (!loaded) {
return (
<div style={{ minHeight: “100vh”, background: “#2a2520”, display: “flex”, alignItems: “center”, justifyContent: “center”, fontFamily: “‘Zen Kurenaido’, sans-serif” }}>
<div style={{ textAlign: “center”, color: “#d4a76a” }}>
<div style={{ fontSize: 36, marginBottom: 8 }}>🍶</div>
<div>読み込み中…</div>
</div>
</div>
);
}

return (
<>
{developing && <DevelopingAnimation entry={developing} onComplete={() => { setDeveloping(null); setScreen(“gallery”); }} />}
{screen === “camera” && <PhotoCapture onCapture={p => { setCapturedPhoto(p); setScreen(“editor”); }} onCancel={() => setScreen(“gallery”)} />}
{screen === “editor” && <CardEditor photo={capturedPhoto} existingEntry={selectedEntry} nextNumber={nextNumber} onSave={handleSave} onCancel={() => { setScreen(“gallery”); setSelectedEntry(null); setCapturedPhoto(null); }} />}
{screen === “detail” && selectedEntry && <DetailView entry={selectedEntry} onBack={() => { setScreen(“gallery”); setSelectedEntry(null); }} onEdit={e => { setSelectedEntry(e); setCapturedPhoto(null); setScreen(“editor”); }} onDelete={handleDelete} />}
{screen === “gallery” && <BookGallery entries={entries} onSelect={e => { setSelectedEntry(e); setScreen(“detail”); }} onNewEntry={() => { setSelectedEntry(null); setCapturedPhoto(null); setScreen(“camera”); }} />}
</>
);
}
